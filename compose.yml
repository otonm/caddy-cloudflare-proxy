configs:
  caddy_admin:
    content: |
      {
        "admin": {
          "listen": "0.0.0.0:2019",
          "enforce_origin": false
        }
      }

services:
  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    command: caddy run --config /etc/caddy/config.json --adapter json --resume
    ports:
      - 80:80
      - 443:443
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    configs:
      - source: caddy_admin
        target: /etc/caddy/config.json
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    image: ghcr.io/otonm/caddy-cloudflare-proxy:latest
    container_name: proxy
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - app-data:/data
    environment:
      NODE_ENV: production
      CF_API_TOKEN: ${CF_API_TOKEN}
      TS_API_KEY: ${TS_API_KEY}
      TS_TAILNET: ${TS_TAILNET}
      ACME_EMAIL: ${ACME_EMAIL}
      DEBUG: ${DEBUG}
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  caddy-data:
  caddy-config:
  app-data:
