services:
  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CADDY_ADMIN: 0.0.0.0:2019
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    image: ghcr.io/otonm/caddy-cloudflare-proxy:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - app-data:/data
    environment:
      NODE_ENV: production
      CF_API_TOKEN: ${CF_API_TOKEN}
      TS_API_KEY: ${TS_API_KEY}
      TS_TAILNET: ${TS_TAILNET}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  caddy-data:
  caddy-config:
  app-data:
